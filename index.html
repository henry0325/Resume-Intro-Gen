<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Henry | 通用工程職位簡報網站</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="controls mobile-floating-controls" aria-label="Language switch">
  <button class="lang-toggle active" data-lang-btn="zh" type="button">中文</button>
  <button class="lang-toggle" data-lang-btn="en" type="button">EN</button>
</div>

  <main class="deck">
    
    <section class="slide active hero-slide">
      <div class="topbar">
        <div class="brand"><span class="dot"></span><span data-zh="Henry Chang｜通用工程職位簡報版" data-en="Henry Chang | General Engineering Deck"></span></div>
        <div class="controls">
          <button class="lang-toggle active" data-lang-btn="zh">中文</button>
          <button class="lang-toggle" data-lang-btn="en">EN</button>
        </div>
      </div>
      <div class="main">
        <div class="panel hero hero-clean">
          <div class="hero-copy">
            <div class="kicker" data-zh="General Engineering Profile" data-en="General Engineering Profile"></div>
            <h1 class="h1" data-zh="能在不同工程職位間快速接軌的系統型人才" data-en="A systems-minded candidate who ramps up quickly across engineering roles"></h1>
            <p class="lead" data-zh="適合投遞自動化、聲學、測試、系統整合等工程職位，重點放在通用能力、學習速度與可遷移價值。" data-en="Built for automation, acoustics, testing, system integration, and other engineering roles, with focus on transferable capability, learning speed, and practical value."></p>
            <div class="hero-actions compact"><span class="hero-pill" data-zh="通用工程版" data-en="General engineering"></span><span class="hero-pill" data-zh="跨職位可用" data-en="Cross-role ready"></span><span class="hero-pill" data-zh="雙語切換" data-en="Bilingual"></span></div>
            <div class="summary-grid">
              <div class="summary-card"><div class="summary-title" data-zh="關鍵特質" data-en="Traits"></div><div class="summary-text" data-zh="邏輯拆解、系統思考、執行力" data-en="Problem breakdown, systems thinking, execution"></div></div>
              <div class="summary-card"><div class="summary-title" data-zh="通用能力" data-en="Transferable skills"></div><div class="summary-text" data-zh="分析、驗證、優化、協作與學習" data-en="Analysis, validation, optimization, collaboration, and learning"></div></div>
            </div>
          </div>
          <div class="hero-side">
            <div class="photo-wrap clean-photo">
              <img src="./assets/profile.jpg" alt="Henry profile" />
              <div class="photo-caption"><strong>Henry Chang</strong><span data-zh="跨工程職位可延伸的系統思維與問題解決能力" data-en="Systems thinking and problem-solving capability transferable across roles"></span></div>
            </div>
            <div class="intro-note"><span data-zh="用網頁投影片方式展示，電腦與手機都能直覺操作" data-en="Presented as a web-slide deck with intuitive desktop and mobile navigation"></span></div>
          </div>
        </div>
      </div>
      <div class="bottombar hero-bottombar"><button class="nav-btn nav-ghost" aria-hidden="true" tabindex="-1">上一頁</button><div class="progress"><span></span></div><button class="nav-btn" data-next data-zh="下一頁" data-en="Next"></button><div class="page-indicator"></div></div>
    </section>

    <section class="slide">
      <div class="topbar"><div class="brand"><span class="dot"></span><span data-zh="通用能力" data-en="Transferable capabilities"></span></div><div class="helper" data-zh="點畫面到下一頁｜← → 切換｜H / E 切語言" data-en="Tap to advance | ← → navigate | H / E language"></div></div>
      <div class="main split-2">
        <div class="panel">
          <h2 class="h2" data-zh="不受職稱限制的能力" data-en="Capabilities not limited by title"></h2>
          <div class="bullets">
            <div class="bullet"><span class="mark"></span><div data-zh="面對新領域時，能先建立結構，再逐步補齊知識與執行方式。" data-en="When facing a new domain, I establish structure first and then fill in knowledge and execution details."></div></div>
            <div class="bullet"><span class="mark"></span><div data-zh="習慣把經驗整理成流程與方法，而不是只停留在個人經驗。" data-en="I turn experience into workflows and methods rather than leaving it as personal know-how."></div></div>
            <div class="bullet"><span class="mark"></span><div data-zh="能把技術內容轉成可溝通、可落地的合作語言。" data-en="I translate technical content into collaborative language that can be executed."></div></div>
          </div>
        </div>
        <div class="panel">
          <h2 class="h2" data-zh="能力地圖" data-en="Capability map"></h2>
          <div class="card-grid">
            <div class="mini-card"><h3 data-zh="問題拆解" data-en="Problem breakdown"></h3><p data-zh="先界定問題，再逐步排除與驗證。" data-en="Define the problem first, then eliminate and verify step by step."></p></div>
            <div class="mini-card"><h3 data-zh="流程優化" data-en="Workflow optimization"></h3><p data-zh="把重複工作轉成更穩定的做法。" data-en="Turn repetitive work into more stable methods."></p></div>
            <div class="mini-card"><h3 data-zh="跨部門合作" data-en="Cross-functional work"></h3><p data-zh="理解不同角色需求，降低溝通落差。" data-en="Understand the needs of different roles and reduce communication gaps."></p></div>
            <div class="mini-card"><h3 data-zh="學習速度" data-en="Learning speed"></h3><p data-zh="能快速建立新工具與新場景的操作框架。" data-en="Build operational frameworks quickly for new tools and contexts."></p></div>
          </div>
        </div>
      </div>
      <div class="bottombar"><button class="nav-btn" data-prev data-zh="上一頁" data-en="Prev"></button><div class="progress"><span></span></div><button class="nav-btn" data-next data-zh="下一頁" data-en="Next"></button><div class="page-indicator"></div></div>
    </section>

    <section class="slide">
      <div class="topbar"><div class="brand"><span class="dot"></span><span data-zh="經驗轉譯" data-en="Experience translated"></span></div><div class="mobile-nav-hint" data-zh="手機可左右或上下滑動切頁" data-en="Swipe on mobile to navigate"></div></div>
      <div class="main split-2">
        <div class="panel">
          <h2 class="h2" data-zh="從經驗中帶出的能力" data-en="Capabilities derived from experience"></h2>
          <div class="timeline">
            <div class="timeline-item"><div class="year" data-zh="工程經驗" data-en="Engineering"></div><div><p data-zh="具備聲學工程相關經歷，熟悉驗證、分析、協作與品質意識。" data-en="Experienced in acoustic-engineering-related work, with familiarity in validation, analysis, collaboration, and quality awareness."></p></div></div>
            <div class="timeline-item"><div class="year" data-zh="數位實作" data-en="Digital build"></div><div><p data-zh="持續透過網站、資料管理與應用開發累積系統實作能力。" data-en="Continuously building system implementation capability through web, data management, and app development."></p></div></div>
            <div class="timeline-item"><div class="year" data-zh="學習轉化" data-en="Learning"></div><div><p data-zh="學新東西時不只關注技術本身，也會思考如何導入真實情境。" data-en="When learning something new, I think beyond the technology itself and consider how to apply it in real scenarios."></p></div></div>
          </div>
        </div>
        <div class="panel">
          <h2 class="h2" data-zh="適合投遞的職位方向" data-en="Roles this version can target"></h2>
          <div class="tag-row"><span class="tag" data-zh="自動化工程" data-en="Automation engineering"></span><span class="tag" data-zh="原始聲學" data-en="Acoustics"></span><span class="tag" data-zh="測試工程" data-en="Test engineering"></span><span class="tag" data-zh="系統整合" data-en="System integration"></span><span class="tag" data-zh="軟體/工具開發" data-en="Software/tools"></span></div>
          <div class="bullet-card" style="margin-top:18px;"><h3 data-zh="這版的策略" data-en="Strategy of this deck"></h3><p data-zh="不是把自己綁死在某個職稱，而是讓面試官看到：即使換到不同工程位置，我仍然能用結構化方式快速上手。" data-en="This deck does not lock me into a single title. It shows that even across different engineering roles, I can ramp up quickly with a structured approach."></p></div>
        </div>
      </div>
      <div class="bottombar"><button class="nav-btn" data-prev>←</button><div class="progress"><span></span></div><button class="nav-btn" data-next>→</button><div class="page-indicator"></div></div>
    </section>

    <section class="slide">
      <div class="topbar"><div class="brand"><span class="dot"></span><span data-zh="我希望被如何理解" data-en="How I want to be understood"></span></div><div class="helper" data-zh="整頁點擊可往下一頁" data-en="Click anywhere to advance"></div></div>
      <div class="main split-2">
        <div class="panel">
          <h2 class="h2" data-zh="不是只會一種工具的人" data-en="More than a tool-specific candidate"></h2>
          <div class="bullets">
            <div class="bullet"><span class="mark"></span><div data-zh="我更重視的是：如何把事情做得更穩、更清楚、更能被團隊接住。" data-en="What I care about more is making work more stable, clearer, and easier for teams to continue."></div></div>
            <div class="bullet"><span class="mark"></span><div data-zh="即使角色不同，工程工作裡的邏輯、驗證與協作本質是相通的。" data-en="Even across roles, the core logic, validation, and collaboration of engineering work are connected."></div></div>
            <div class="bullet"><span class="mark"></span><div data-zh="這也是我適合通用版呈現方式的原因。" data-en="That is why a broader presentation format fits me well."></div></div>
          </div>
        </div>
        <div class="panel">
          <h2 class="h2" data-zh="面試時可直接延伸的句子" data-en="Useful interview extensions"></h2>
          <div class="bullet-card"><h3 data-zh="我不是只找單一職稱" data-en="I am not limited to one title"></h3><p data-zh="我更在意的是職位是否能讓我把系統化、驗證與優化能力發揮出來。" data-en="I care more about whether the role lets me apply my strengths in systemization, validation, and optimization."></p></div>
          <div class="bullet-card" style="margin-top:14px;"><h3 data-zh="我有跨領域適應力" data-en="I adapt across domains"></h3><p data-zh="所以我可以帶著原有能力進入新場景，而不是重新從零開始。" data-en="I can carry existing strengths into a new context rather than starting completely from scratch."></p></div>
        </div>
      </div>
      <div class="bottombar"><button class="nav-btn" data-prev>←</button><div class="progress"><span></span></div><button class="nav-btn" data-next>→</button><div class="page-indicator"></div></div>
    </section>

    <section class="slide">
      <div class="topbar"><div class="brand"><span class="dot"></span><span data-zh="結尾" data-en="Closing"></span></div><div class="helper" data-zh="可作為多職位投遞時的網頁履歷展示" data-en="Usable as a general web resume deck"></div></div>
      <div class="main">
        <div class="panel hero" style="grid-template-columns:1fr;">
          <div>
            <div class="kicker" data-zh="General but intentional" data-en="General but intentional"></div>
            <h2 class="h2" data-zh="這個版本的目的，是讓不同職位都能快速看懂我的能力與價值" data-en="The purpose of this version is to make my value easy to understand across different roles."></h2>
            <p class="lead" data-zh="若你希望用網頁代替傳統投影片來做自我介紹，這個版本會比一般履歷頁更有節奏，也比靜態 PDF 更直觀。" data-en="If you want to introduce yourself with a website instead of a traditional deck, this version provides clearer pacing than a typical resume page and feels more intuitive than a static PDF."></p>
            <div class="tag-row"><span class="tag" data-zh="通用工程版" data-en="General engineering"></span><span class="tag" data-zh="雙語切換" data-en="Bilingual"></span><span class="tag" data-zh="手機可用" data-en="Mobile friendly"></span><span class="tag" data-zh="投影片操作" data-en="Slide navigation"></span></div>
          </div>
        </div>
      </div>
      <div class="bottombar"><button class="nav-btn" data-prev data-zh="上一頁" data-en="Prev"></button><div class="progress"><span></span></div><div class="page-indicator"></div></div>
    </section>
  </main>
</body>
<script src="script.js"></script>
</html>
